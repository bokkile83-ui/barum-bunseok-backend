<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BARUM 보장분석</title><style>
*{box-sizing:border-box;font-family:'Malgun Gothic',sans-serif}
body{background:#0f1420;color:#e9edf5;margin:0;padding:24px;display:flex;justify-content:center}
.c{max-width:440px;width:100%}
h1{color:#c9a24b;font-size:20px;border-bottom:2px solid #c9a24b;padding-bottom:8px}
.box{background:#141b2b;border:1px solid #2a3550;border-radius:12px;padding:18px;margin-top:14px}
label{font-size:13px;color:#8a93a6;display:block;margin:10px 0 4px}
input{width:100%;background:#1b2436;border:1px solid #2a3550;color:#e9edf5;border-radius:8px;padding:11px;font-size:14px}
button{width:100%;background:#c9a24b;color:#0f1420;border:0;border-radius:8px;padding:13px;font-weight:700;font-size:15px;margin-top:16px;cursor:pointer}
button:disabled{opacity:.5}
#st{margin-top:12px;font-size:13px;color:#8a93a6;white-space:pre-wrap}
.hint{font-size:11px;color:#6b7488;margin-top:10px}
</style></head><body><div class="c">
<h1>BARUM 보장분석</h1>
<div class="box">
<label>접근 비밀번호</label><input id="pw" type="password" placeholder="****">
<label>보장분석 리포트 PDF</label><input id="f" type="file" accept="application/pdf">
<button id="b" onclick="go()">분석 → 엑셀+PPT 받기</button>
<div id="st"></div>
<div class="hint">PDF 1개 업로드 → 계약별 분석 → 색칠 엑셀 + 보장분석지 PPT ZIP. 결과는 증권 최종확인.</div>
</div></div>
<script>
async function go(){
 const pw=document.getElementById('pw').value, f=document.getElementById('f').files[0], st=document.getElementById('st'), b=document.getElementById('b');
 if(!pw||!f){st.textContent='비밀번호와 PDF를 넣어주세요.';return}
 b.disabled=true; st.textContent='분석 중… (계약 많으면 1~2분)';
 const fd=new FormData(); fd.append('password',pw); fd.append('file',f);
 try{
  const r=await fetch('/analyze',{method:'POST',body:fd});
  if(!r.ok){st.textContent='오류: '+(await r.text());b.disabled=false;return}
  const blob=await r.blob(); const u=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=u; a.download='barum_result.zip'; a.click();
  st.textContent='완료. ZIP 다운로드됨.';
 }catch(e){st.textContent='실패: '+e.message}
 b.disabled=false;
}
</script></body></html>
